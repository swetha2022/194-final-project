# Same recipe as sft_moonlight_c4_webtext_openai.yaml but finetune with
# torch.optim.Muon (PyTorch >= 2.9). Standalone file so Hydra does not merge
# AdamW-only kwargs (betas/foreach/fused) into Muon.

defaults:
  - sft.yaml

sft:
  max_num_epochs: 1
  max_num_steps: 400
  val_period: 100
  val_batches: 4
  val_global_batch_size: 32
  val_micro_batch_size: 1
  val_at_start: true
  val_at_end: true

checkpointing:
  checkpoint_dir: results/sft_moonlight_c4_webtext_muon_ft
  save_period: 200
  keep_top_k: 3

policy:
  model_name: moonshotai/Moonlight-16B-A3B-Instruct
  tokenizer:
    name: moonshotai/Moonlight-16B-A3B-Instruct
    chat_template: null
    chat_template_kwargs: null
  train_global_batch_size: 8
  train_micro_batch_size: 1
  max_total_sequence_length: 2048
  precision: bfloat16
  optimizer:
    name: torch.optim.Muon
    kwargs:
      lr: 1.0e-5
      weight_decay: 0.01
      momentum: 0.95
      nesterov: true
      ns_steps: 5
      eps: 1.0e-7
      ns_coefficients: [3.4445, -4.775, 2.0315]
      adjust_lr_fn: "match_rms_adamw"
    # Used only if MuonAdamWHybrid is built (e.g. rare non-2D trainables); unused for pure-matrix FT.
    adam_aux_kwargs:
      betas: [0.9, 0.95]
      eps: 1.0e-8
      foreach: false
      fused: false

  dtensor_cfg:
    _v2: true
    enabled: true
    tensor_parallel_size: 1
    context_parallel_size: 1
    expert_parallel_size: 8
    sequence_parallel: false
    activation_checkpointing: true
    cpu_offload: false
    clear_cache_every_n_steps: null
    automodel_kwargs:
      use_liger_kernel: false
      backend:
        _target_: nemo_automodel.components.models.common.utils.BackendConfig
        attn: sdpa
        linear: te
        rms_norm: te
        rope_fusion: false
        enable_deepep: false
        fake_balanced_gate: false
        enable_hf_state_dict_adapter: true
        enable_fsdp_optimizations: false
        gate_precision: float64

    # Full-parameter SFT (no adapters); much heavier VRAM than LoRA.
    lora_cfg:
      enabled: false
      target_modules: []
      exclude_modules: []
      match_all_linear: false
      dim: 16
      alpha: 32
      dropout: 0.05
      dropout_position: post
      lora_A_init: xavier
      use_triton: false

data:
  add_generation_prompt: false
  shuffle: true
  train:
    dataset_name: openai_format
    data_path: data/moonlight_c4_sft/train.jsonl
    chat_key: messages
    system_key: null
    system_prompt: null
    tool_key: tools
    use_preserving_dataset: false
  validation:
    dataset_name: openai_format
    data_path: data/moonlight_c4_sft/val.jsonl
    chat_key: messages
    system_key: null
    system_prompt: null
    tool_key: tools
    use_preserving_dataset: false

logger:
  wandb:
    name: sft-moonlight-c4-webtext-muon-ft
  tensorboard:
    log_dir: tb_logs-sft-moonlight-c4-webtext-muon-ft

cluster:
  gpus_per_node: 8
  num_nodes: 1
